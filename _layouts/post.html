---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y 年 %m 月 %d 日" }}</span>
      {% if page.author %}
      <span>作者：{{ page.author }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </footer>
</article>
